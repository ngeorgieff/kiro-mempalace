name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate power structure
        run: |
          echo "Checking required files..."
          test -f powers/mempalace/POWER.md || (echo "❌ Missing POWER.md" && exit 1)
          test -f powers/mempalace/mcp.json || (echo "❌ Missing mcp.json" && exit 1)

      - name: Validate JSON
        run: python3 -c "import json; json.load(open('powers/mempalace/mcp.json')); print('✅ mcp.json is valid')"

      - name: Validate POWER.md frontmatter
        run: |
          python3 -c "
          import re, sys
          content = open('powers/mempalace/POWER.md').read()
          fm = re.search(r'^---\n(.*?)\n---', content, re.DOTALL)
          if not fm:
              print('❌ No frontmatter found'); sys.exit(1)
          required = ['name:', 'displayName:', 'description:']
          missing = [f for f in required if f not in fm.group(1)]
          if missing:
              print(f'❌ Missing frontmatter fields: {missing}'); sys.exit(1)
          print('✅ Frontmatter valid')
          "

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generate_release_notes: true
